<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TETRIS Classic</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#05050f;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;
  font-family:'Press Start 2P','Courier New',monospace;
  user-select:none;
  overflow:hidden;
}
/* Scanline overlay for CRT feel */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;z-index:100;
}

/* ─── Outer Shell ─── */
.shell{
  border:4px solid #6655bb;
  background:#0c0b22;
  box-shadow:0 0 50px rgba(100,80,220,0.18),0 0 120px rgba(80,60,180,0.08),inset 0 0 40px rgba(0,0,0,0.7);
  position:relative;
}

/* ─── Title Bar ─── */
.titlebar{
  text-align:center;padding:10px 0;
  font-size:20px;color:#ff1111;
  letter-spacing:6px;
  text-shadow:0 0 14px #ff0000,0 0 28px rgba(255,0,0,0.4),3px 3px 0 #550000;
  border-bottom:3px solid #6655bb;
  background:linear-gradient(180deg,#100f30 0%,#07071a 100%);
}

/* ─── Main Row ─── */
.mainrow{display:flex;}

/* ─── Side Panels ─── */
.panel{
  width:112px;background:#07071c;
  padding:8px;
  display:flex;flex-direction:column;gap:8px;
}
.panel.left{border-right:3px solid #6655bb;}
.panel.right{border-left:3px solid #6655bb;}

.pbox{
  border:2px solid #332266;padding:7px;
  background:#04040e;
}
.plbl{
  font-size:6px;color:#5544bb;
  letter-spacing:1px;margin-bottom:5px;
}
.pval{font-size:12px;color:#eeeeff;letter-spacing:1px;}

/* ─── Next Canvas ─── */
#nxt{
  display:block;background:#000410;
  border:1px solid #332266;margin-top:4px;
}

/* ─── Main Canvas ─── */
.cvswrap{position:relative;flex-shrink:0;}
canvas#tetris{display:block;background:#000510;image-rendering:pixelated;}

/* ─── Overlay ─── */
#ov{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
}
#ov.hide{display:none;}
.ovttl{
  font-size:12px;color:#ff1111;
  text-shadow:0 0 16px #ff0000,0 0 32px rgba(255,0,0,0.3);
  animation:blink .9s step-end infinite;
}
.ovsub{font-size:7px;color:#7766cc;}
@keyframes blink{50%{opacity:0;}}

/* ─── Bottom Bar ─── */
.btmbar{
  border-top:3px solid #6655bb;
  background:#060618;
  padding:7px 14px;
  display:flex;justify-content:space-between;
  font-size:7px;color:#4455aa;
}

/* ─── Stats ─── */
.srow{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.sdot{width:8px;height:8px;flex-shrink:0;border:1px solid rgba(0,0,0,0.4);}
.stxt{font-size:6px;color:#bbbbdd;}

/* ─── Controls ─── */
.ctxt{font-size:5px;color:#333355;line-height:2.2;}

/* ─── Level progress bar ─── */
.progwrap{width:100%;height:4px;background:#111130;border:1px solid #332266;margin-top:6px;}
.progbar{height:100%;background:linear-gradient(90deg,#5533ff,#aa44ff);transition:width .3s;}
</style>
</head>
<body>
<div class="shell">
  <div class="titlebar">TETЯIS</div>
  <div class="mainrow">

    <!-- ─── LEFT PANEL ─── -->
    <div class="panel left">
      <div class="pbox">
        <div class="plbl">NEXT</div>
        <canvas id="nxt" width="92" height="72"></canvas>
      </div>
      <div class="pbox">
        <div class="plbl">LEVEL</div>
        <div class="pval" id="ui-lvl">1</div>
        <div class="progwrap"><div class="progbar" id="ui-prog" style="width:0%"></div></div>
      </div>
      <div class="pbox">
        <div class="plbl">LINES</div>
        <div class="pval" id="ui-lines">0</div>
      </div>
      <div class="pbox" style="flex:1">
        <div class="plbl">KEYS</div>
        <div class="ctxt">
          ←→ MOVE<br>
          ↑ / X  CW↻<br>
          Z  CCW↺<br>
          ↓  SOFT<br>
          SPC  HARD<br>
          P  PAUSE
        </div>
      </div>
    </div>

    <!-- ─── MAIN CANVAS ─── -->
    <div class="cvswrap">
      <canvas id="tetris" width="240" height="480"></canvas>
      <div id="ov" class="hide">
        <div class="ovttl" id="ov-ttl">GAME OVER</div>
        <div class="ovsub" id="ov-sub">PRESS ENTER</div>
      </div>
    </div>

    <!-- ─── RIGHT PANEL ─── -->
    <div class="panel right">
      <div class="pbox">
        <div class="plbl">SCORE</div>
        <div class="pval" id="ui-score">000000</div>
      </div>
      <div class="pbox">
        <div class="plbl">HI-SCORE</div>
        <div class="pval" id="ui-hi">010000</div>
      </div>
      <div class="pbox" style="flex:1">
        <div class="plbl">STATS</div>
        <div id="ui-stats"></div>
      </div>
    </div>

  </div><!-- /mainrow -->
  <div class="btmbar">
    <span id="ui-status" style="color:#33ff55">● PLAYING</span>
    <span>ROUND 1</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  TETRIS CLASSIC REMASTERED
// ═══════════════════════════════════════════════════
const cv  = document.getElementById('tetris');
const ctx = cv.getContext('2d');
const nc  = document.getElementById('nxt');
const nCtx= nc.getContext('2d');

const W=10, H=20, B=24;   // board cols, rows, block px

// ── Colors (index = value in matrix) ──────────────
const COL = [
  null,
  '#bb33ff', // 1  T  purple
  '#11ccff', // 2  I  cyan
  '#22ee55', // 3  S  green
  '#ff2211', // 4  Z  red
  '#ff9911', // 5  L  orange
  '#2244ff', // 6  J  blue
  '#ffee00', // 7  O  yellow
  '#445566', // 8  garbage
];

// ── SRS piece definitions ─────────────────────────
const SHAPES = {
  T:[[0,1,0],[1,1,1],[0,0,0]],
  I:[[0,0,0,0],[2,2,2,2],[0,0,0,0],[0,0,0,0]],
  S:[[0,3,3],[3,3,0],[0,0,0]],
  Z:[[4,4,0],[0,4,4],[0,0,0]],
  L:[[0,0,5],[5,5,5],[0,0,0]],
  J:[[6,0,0],[6,6,6],[0,0,0]],
  O:[[7,7],[7,7]],
};
const KEYS = Object.keys(SHAPES);

// ── 7-bag randomizer ──────────────────────────────
let bag = [];
function pick(){
  if(!bag.length){
    bag=[...KEYS];
    for(let i=bag.length-1;i>0;i--){
      const j=Math.random()*(i+1)|0;
      [bag[i],bag[j]]=[bag[j],bag[i]];
    }
  }
  return bag.pop();
}

// ── State ─────────────────────────────────────────
let arena, pl, nxType, nxMat;
let score, lines, level, hiSc=10000;
let counts={};
let gameOver, paused, flash=0;
let dc=0, di=800, lt=0, raf;
// Flash animation for line clears
let flashRows=[]; // which rows are being cleared

// ── Arena ─────────────────────────────────────────
function newArena(){
  return Array.from({length:H},()=>new Array(W).fill(0));
}

// ── Init ──────────────────────────────────────────
function init(){
  arena=newArena();
  score=lines=0; level=1; di=800; dc=0; lt=0;
  gameOver=false; paused=false; flash=0; flashRows=[];
  KEYS.forEach(k=>counts[k]=0);
  bag=[];
  nxType=pick(); nxMat=SHAPES[nxType].map(r=>[...r]);
  spawn();
  updUI();
  document.getElementById('ov').classList.add('hide');
  setStatus('● PLAYING','#33ff55');
  cancelAnimationFrame(raf);
  lt=performance.now();
  raf=requestAnimationFrame(loop);
}

// ── Spawn ─────────────────────────────────────────
function spawn(){
  pl={
    type:nxType,
    mat:nxMat.map(r=>[...r]),
    x:Math.floor(W/2)-Math.floor(nxMat[0].length/2),
    y:0,
  };
  counts[pl.type]++;
  nxType=pick(); nxMat=SHAPES[nxType].map(r=>[...r]);
  if(hit(arena,pl.mat,pl.x,pl.y)){ endGame(); return; }
  updUI();
}

// ── Collision ─────────────────────────────────────
function hit(a,m,ox,oy){
  for(let y=0;y<m.length;y++)
    for(let x=0;x<m[y].length;x++){
      if(!m[y][x]) continue;
      const nx=ox+x, ny=oy+y;
      if(nx<0||nx>=W||ny>=H) return true;
      if(ny>=0&&a[ny][nx])   return true;
    }
  return false;
}

// ── Merge ─────────────────────────────────────────
function merge(){
  pl.mat.forEach((r,dy)=>r.forEach((v,dx)=>{
    if(v && pl.y+dy>=0) arena[pl.y+dy][pl.x+dx]=v;
  }));
}

// ── Sweep with animation ──────────────────────────
const PTS=[0,100,300,500,800];
function sweep(){
  let cleared=0;
  flashRows=[];
  for(let y=H-1;y>=0;){
    if(arena[y].every(v=>v)){
      flashRows.push(y+cleared);
      arena.splice(y,1);
      arena.unshift(new Array(W).fill(0));
      cleared++;
    } else y--;
  }
  if(cleared){
    score+=PTS[cleared]*level;
    lines+=cleared;
    level=Math.floor(lines/10)+1;
    di=Math.max(50,800-(level-1)*75);
    if(score>hiSc) hiSc=score;
    flash=10;
  }
}

// ── Drop ──────────────────────────────────────────
function soft(fromKey=false){
  if(gameOver||paused) return;
  pl.y++;
  if(hit(arena,pl.mat,pl.x,pl.y)){
    pl.y--;
    merge();
    sweep();
    if(!gameOver) spawn();
  } else if(fromKey){
    score++;
  }
  dc=0;
}

function hard(){
  if(gameOver||paused) return;
  while(!hit(arena,pl.mat,pl.x,pl.y+1)){pl.y++;score+=2;}
  merge();
  sweep();
  if(!gameOver) spawn();
  dc=0;
  updUI();
}

// ── Move / Rotate ─────────────────────────────────
function mov(d){
  if(paused||gameOver) return;
  pl.x+=d;
  if(hit(arena,pl.mat,pl.x,pl.y)) pl.x-=d;
}

function rotateCW(m){ return m[0].map((_,i)=>m.map(r=>r[i]).reverse()); }
function rotateCCW(m){ return m[0].map((_,i)=>m.map(r=>r[r.length-1-i])); }

function rot(d){
  if(paused||gameOver) return;
  const orig=pl.mat;
  pl.mat = d>0 ? rotateCW(pl.mat) : rotateCCW(pl.mat);
  // SRS wall kicks
  for(const k of [0,-1,1,-2,2]){
    pl.x+=k;
    if(!hit(arena,pl.mat,pl.x,pl.y)) return;
    pl.x-=k;
  }
  pl.mat=orig;
}

// ── Ghost Y ───────────────────────────────────────
function ghostY(){
  let gy=pl.y;
  while(!hit(arena,pl.mat,pl.x,gy+1)) gy++;
  return gy;
}

// ═══════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════

function drawBlock(c, bx, by, ci, sz, alpha=1){
  if(!ci||by<0) return;
  const col=COL[ci];
  c.globalAlpha=alpha;

  // Base fill
  c.fillStyle=col;
  c.fillRect(bx*sz, by*sz, sz, sz);

  // Top-left highlight
  c.fillStyle='rgba(255,255,255,0.30)';
  c.fillRect(bx*sz+1, by*sz+1, sz-2, 2);
  c.fillRect(bx*sz+1, by*sz+1, 2, sz-2);

  // Inner center shine
  c.fillStyle='rgba(255,255,255,0.08)';
  c.fillRect(bx*sz+4, by*sz+4, sz-8, sz-8);

  // Bottom-right shadow
  c.fillStyle='rgba(0,0,0,0.45)';
  c.fillRect(bx*sz+1, by*sz+sz-3, sz-2, 2);
  c.fillRect(bx*sz+sz-3, by*sz+1, 2, sz-2);

  // Outline
  c.strokeStyle='rgba(0,0,0,0.55)';
  c.lineWidth=0.5;
  c.strokeRect(bx*sz+0.5, by*sz+0.5, sz-1, sz-1);

  c.globalAlpha=1;
}

function render(){
  // ── Background
  ctx.fillStyle='#000510';
  ctx.fillRect(0,0,W*B,H*B);

  // ── Grid lines
  ctx.strokeStyle='rgba(70,70,160,0.07)';
  ctx.lineWidth=0.5;
  for(let x=0;x<=W;x++){ctx.beginPath();ctx.moveTo(x*B,0);ctx.lineTo(x*B,H*B);ctx.stroke();}
  for(let y=0;y<=H;y++){ctx.beginPath();ctx.moveTo(0,y*B);ctx.lineTo(W*B,y*B);ctx.stroke();}

  // ── Arena
  arena.forEach((row,y)=>row.forEach((v,x)=>drawBlock(ctx,x,y,v,B)));

  // ── Ghost piece
  if(pl&&!gameOver){
    const gy=ghostY();
    if(gy!==pl.y){
      pl.mat.forEach((row,dy)=>row.forEach((v,dx)=>{
        if(!v||gy+dy<0) return;
        const gx=(pl.x+dx)*B, gyp=(gy+dy)*B;
        ctx.globalAlpha=0.12;
        ctx.fillStyle=COL[v]||'#fff';
        ctx.fillRect(gx+2,gyp+2,B-4,B-4);
        ctx.globalAlpha=0.22;
        ctx.strokeStyle=COL[v];
        ctx.lineWidth=0.8;
        ctx.strokeRect(gx+1.5,gyp+1.5,B-3,B-3);
        ctx.globalAlpha=1;
      }));
    }
  }

  // ── Active piece
  if(pl){
    pl.mat.forEach((row,dy)=>row.forEach((v,dx)=>{
      if(v) drawBlock(ctx,pl.x+dx,pl.y+dy,v,B);
    }));
  }

  // ── Line clear flash
  if(flash>0){
    const a=flash/12;
    // Flash individual cleared rows (already swept, so just full screen flash)
    ctx.fillStyle=`rgba(255,255,255,${a*0.6})`;
    ctx.fillRect(0,0,W*B,H*B);
    // Edge glow
    const g=ctx.createLinearGradient(0,0,W*B,0);
    g.addColorStop(0,`rgba(150,100,255,${a})`);
    g.addColorStop(0.5,'transparent');
    g.addColorStop(1,`rgba(150,100,255,${a})`);
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W*B,H*B);
    flash--;
  }

  // ── Next piece canvas
  nCtx.fillStyle='#000410';
  nCtx.fillRect(0,0,nc.width,nc.height);
  if(nxMat){
    const ns=16;
    const ox=Math.floor((nc.width/ns - nxMat[0].length)/2);
    const oy=Math.floor((nc.height/ns - nxMat.length)/2);
    nxMat.forEach((row,dy)=>row.forEach((v,dx)=>{
      if(v) drawBlock(nCtx,ox+dx,oy+dy,v,ns);
    }));
  }
}

// ── UI Update ─────────────────────────────────────
function updUI(){
  document.getElementById('ui-score').textContent=String(score).padStart(6,'0');
  document.getElementById('ui-lines').textContent=lines;
  document.getElementById('ui-lvl').textContent=level;
  document.getElementById('ui-hi').textContent=String(hiSc).padStart(6,'0');

  // Level progress (lines within this level, 0-9)
  const prog=(lines%10)/10*100;
  document.getElementById('ui-prog').style.width=prog+'%';

  // Stats
  const st=document.getElementById('ui-stats');
  st.innerHTML='';
  KEYS.forEach(k=>{
    const v=SHAPES[k].flat().find(n=>n>0);
    const d=document.createElement('div');
    d.className='srow';
    d.innerHTML=`<div class="sdot" style="background:${COL[v]}"></div>`+
                `<span class="stxt">${k}: ${String(counts[k]).padStart(2,'0')}</span>`;
    st.appendChild(d);
  });
}

function setStatus(t,c){
  const el=document.getElementById('ui-status');
  el.textContent=t; el.style.color=c;
}

// ── Game Over ─────────────────────────────────────
function endGame(){
  gameOver=true;
  document.getElementById('ov').classList.remove('hide');
  document.getElementById('ov-ttl').textContent='GAME OVER';
  document.getElementById('ov-sub').textContent='PRESS ENTER';
  setStatus('■ GAME OVER','#ff3333');
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function loop(t){
  raf=requestAnimationFrame(loop);
  const dt=t-lt; lt=t;
  if(!gameOver&&!paused){
    dc+=dt;
    if(dc>di) soft();
  }
  render();
}

// ═══════════════════════════════════════════════════
//  INPUT — Keyboard with DAS/ARR
// ═══════════════════════════════════════════════════
let dasL,arrL,dasR,arrR;
const DAS=167, ARR=33;

document.addEventListener('keydown',e=>{
  if(gameOver){
    if(e.code==='Enter'||e.code==='Space') init();
    return;
  }
  switch(e.code){
    case'ArrowLeft':
      e.preventDefault();
      mov(-1);
      clearTimeout(dasL); clearInterval(arrL);
      dasL=setTimeout(()=>{ arrL=setInterval(()=>mov(-1),ARR); },DAS);
      break;
    case'ArrowRight':
      e.preventDefault();
      mov(1);
      clearTimeout(dasR); clearInterval(arrR);
      dasR=setTimeout(()=>{ arrR=setInterval(()=>mov(1),ARR); },DAS);
      break;
    case'ArrowDown':
      e.preventDefault();
      soft(true); updUI();
      break;
    case'ArrowUp': case'KeyX':
      e.preventDefault(); rot(1); break;
    case'KeyZ':
      e.preventDefault(); rot(-1); break;
    case'Space':
      e.preventDefault(); hard(); break;
    case'KeyP': case'Escape':
      e.preventDefault();
      paused=!paused;
      if(paused){
        document.getElementById('ov').classList.remove('hide');
        document.getElementById('ov-ttl').textContent='PAUSED';
        document.getElementById('ov-sub').textContent='PRESS P';
        setStatus('⏸ PAUSED','#ffaa33');
      } else {
        document.getElementById('ov').classList.add('hide');
        setStatus('● PLAYING','#33ff55');
        lt=performance.now();
      }
      break;
  }
});

document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'){ clearTimeout(dasL); clearInterval(arrL); }
  if(e.code==='ArrowRight'){ clearTimeout(dasR); clearInterval(arrR); }
});

// ═══════════════════════════════════════════════════
//  INPUT — Touch
// ═══════════════════════════════════════════════════
let tx=0,ty=0,lastTap=0,tmoved=false;

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
  tmoved=false;
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const dx=e.touches[0].clientX-tx;
  const dy=e.touches[0].clientY-ty;
  if(Math.abs(dx)>28){ mov(dx>0?1:-1); tx=e.touches[0].clientX; tmoved=true; }
  if(dy>40){ soft(true); ty=e.touches[0].clientY; tmoved=true; }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  const now=Date.now();
  if(!tmoved){
    if(now-lastTap<280) hard();
    else rot(1);
    lastTap=now;
  }
},{passive:false});

// ─── Start ────────────────────────────────────────
init();
</script>
</body>
</html>
